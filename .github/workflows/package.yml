name: Package App

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'packaging'
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            node-version: '20.x'
            name: 'Windows'
          - os: macos-latest
            node-version: '20.x'
            name: 'macOS'

    runs-on: ${{ matrix.os }}
    name: Package for ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Python (for backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Tesseract (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install tesseract --no-progress -y

      - name: Install Tesseract (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install tesseract

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Build backend
        run: npm run build:backend

      - name: Verify bundled Tesseract (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $root = 'backend/dist/rustorbust-backend/tesseract'
          $required = @(
            "$root/tesseract.exe",
            "$root/tessdata/eng.traineddata",
            "$root/tessdata/osd.traineddata"
          )
          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            Write-Error "Missing bundled Tesseract files:`n$($missing -join "`n")"
            exit 1
          }
          Write-Host 'Tesseract bundle verified.'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build:electron

      - name: Make packages (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run make

      - name: Make packages (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run make

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rustorbustapp-windows
          path: out/make/**/*
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rustorbustapp-macos
          path: out/make/**/*
          if-no-files-found: warn

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: out/make/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
